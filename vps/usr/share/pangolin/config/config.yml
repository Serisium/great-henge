# Seed copied to /var/lib/pangolin/config/config.yml on first boot by
# pangolin-config-init.service, which also replaces __PANGOLIN_SECRET__.
# All options: https://docs.pangolin.net/

gerbil:
    start_port: 51820
    base_endpoint: "portal.seri.dev"

app:
    dashboard_url: "https://portal.seri.dev"
    log_level: "info"
    telemetry:
        anonymous_usage: true

domains:
    domain1:
        base_domain: "seri.dev"

server:
    secret: "__PANGOLIN_SECRET__"
    cors:
        origins: ["https://portal.seri.dev"]
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        allowed_headers: ["X-CSRF-Token", "Content-Type"]
        credentials: false

flags:
    require_email_verification: false
    disable_signup_without_invite: true
    disable_user_create_org: false
    allow_raw_resources: true
